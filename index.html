<script>
    // Blocare instantă dacă nu există parola salvată în browser
    if (localStorage.getItem("authorized") !== "true") {
        let parola = prompt("Acces restricționat. Introdu parola pentru Dispecerat Imagine:");
        if (parola === "imagineteren") {
            localStorage.setItem("authorized", "true");
        } else {
            alert("Parolă incorectă!");
            window.location.reload(); // Reîncarcă pagina ca să ceară iar
        }
    }
</script>
